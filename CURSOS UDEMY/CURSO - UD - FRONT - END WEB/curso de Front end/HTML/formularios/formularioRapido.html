<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios de Formulario</title>
</head>
<body>

    <h1>Exercicios de formularios</h1>
  
    <form action="processa.html">
         
        
    <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="nome">Nome</label><br>
        <input type="nome" name="nome" id="nome"><br>

         <label for="email">Email</label><br>
        <input type="text" name="email" id="email"><br>

        <input type="checkbox" name="receber_email">
        <label>Quero receber emails</label><br><br>

        <label for="senha">Senha</label><br>
        <input type="password" name="senha" id="senha"><br>

    </fieldset>

    <fieldset>
       <legend>Informações adicionais</legend>

       <input type="radio" name="tipo" id="pf" value="PF">
       <label for="pf">Pessoa Fisica</label>

       <input type="radio" name="tipo" id="pj" value="pj">
       <label for="pj">Pessoa Juridica</label>

    </fieldset>

    <br>
    <input type="submit" value="Cadastrar">

    </form>

</body>
</html>
