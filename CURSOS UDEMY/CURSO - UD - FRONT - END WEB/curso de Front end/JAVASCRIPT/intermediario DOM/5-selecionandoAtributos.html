<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>mudando a imagem com js </h1>

    <img id="imagem" src="img/celular.png" alt="" width="300">
    <button onclick="mudarImagem()" >mudar imagem</button>
    <a id="link" href="#">click aqui</a>

    

    <script>

        // alterar a imagem do celular para grafico usando o javascript DOM

        function mudarImagem(){// criando uma função de mudança de imagem dom js dom 
            const img = document.querySelector("#imagem")
            img.src = "img/grafico.png"

             const link = document.querySelector("#link")// desta forma ele usa a mudança tanto na imagem como no link
            link.href = "https://www.bing.com"
        }
        
        function mudarLink(){// mudando de link de google para bing 
            const link = document.querySelector("#link")
            link.href = "https://www.bing.com"
        }
    </script>
    
</body>
</html>
