<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Sistema Grid</title>
</head>
<body>
    <style>
        body{/* o body*/
            background-color: #0B0F1C;/* cor do body */
            border: 0;/* borda */
            margin: 0;/* a margem */
            padding: 0;/* espaçamento interno */
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;/* a font da pagina*/
        }
        /*grid de navegação */
       
        .container-grid{/*container pai*/
            height: 100vh;/* autura do container*/
            display: grid;/* fazendo o container em grades*/
            grid-template-columns: 1fr 1fr 1fr;/* defindo as linhas da coluna ex: a coluna 1 vai ate a 3  */
            grid-template-rows: 30% 100px 400px;/* definindo as linhas que a linha 1 vai ate a linha 4*/
            row-gap: 20px;/* espaço veertical entre as linhas */
            column-gap: 20px;/* espaço horizontal entre as colunas */

            border: 1px solid rgb(235, 220, 13);
        }
        nav{/*barra de navegação vertical */
            width: 280px;/* tamnho da barra de navegação */
            border-right: 1px solid rgb(63, 65, 63);/* borda direita*/
            box-shadow: 10px 0px 20px rgba(255, 255, 255, 0.105);/* sompra na borda */
            grid-row-start: 1;/* definindo onde começa */
            grid-row-end: 5;/* */
            padding: 20px;/*espaço interno */
            display: flex;/* definindo um display flex dentro na nav*/
            flex-direction: column;/*  em colunas */
            align-items: center;/* alinhando o item ao centro*/
            
                
        }
        i{/*icone do botão */ 
            font-size: 20px;
            color: white;
            margin-left: 10px;
        }

        .container-grid >  div{ /* coteudo */
            border: 1px solid red;  
            position: relative;
            display: flex;
            right: 280px;
            grid-column-start: 2;
            grid-column-end: 4;
                
        }

        /* dentro da nav */

        .nav-bar ul{
            list-style: none;
            padding: 20px;
            margin-right: 1px;
        }

        .nav-bar ul li{
            width: 280px;
            padding: 20px;
           
        }

        .nav-bar ul li:hover{
            cursor: pointer;
            background-color: #4b4942;
            border: 1px solid #868682;
        }

        .nav-bar ul li a{
            text-decoration: none;
            color: white;
            margin-left: 30px;
        }


    </style>

<section class="container-grid">

    <nav class="nav-bar"><!-- nav-bar -->
        <img src="mental-health.png" width="50" alt="">
        <ul>
            <li onclick="Home()"><i class="bi bi-plus-lg"></i><a href="#">Novo</a></li>
            <li onclick="pagina2()"><i class="bi bi-clock-fill"></i><a href="#">Fila</a></li>
            <li><i class="bi bi-person-vcard"></i><a href="#">Atendimentos</a></li>
            <li><i class="bi bi-x-octagon"></i><a href="#">Cancelados</a></li>
            <li><i class="bi bi-wallet2"></i><a href="#">Caixa</a></li>
            <li><i class="bi bi-gear-fill"></i><a href="#">Configurações</a></li>
            <li><i class="bi bi-box-arrow-right"></i><a href="#">Fechar</a></li>
        </ul>

    </nav><!-- nav-bar-->

    <div class="cont"> <!-- cont -->

    </div><!-- cont -->

    <div class="cont2"><!-- cont2 -->

    </div><!-- cont2 -->

</section>
    
</body>
<script>

function pagina2(){
    addEventListener('click',function(){
      window.location.href = "pagina2.html";
    })
}

function Home(){
    addEventListener('click',function(){
      window.location.href = "navlateralGrid.html";
    })
}

</script>
</html>
