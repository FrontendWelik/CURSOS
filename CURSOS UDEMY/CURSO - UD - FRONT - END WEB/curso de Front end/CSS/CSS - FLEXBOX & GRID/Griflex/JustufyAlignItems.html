<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <style>
.container {
    background-color: black;
    color: white;
              display: grid;
                grid-template-columns: 1fr 3fr; /* 2 colunas */
                grid-template-rows: auto 1fr auto; /* 3 linhas */
                gap: 10px;/*espaço entre os elementos*/
                border: 1px red solid;
        }

.header {
  grid-column: 1 / 3; /* ocupa toda a largura */
}

.footer {
  grid-column: 1 / 3;
}

    </style>
    <div class="container">
        <header>
            cabeçalho
        </header>

        <footer>
            fundo 
        </footer>
    </div>
    
</body>
</html>
