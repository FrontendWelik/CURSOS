<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Sistema Grid</title>
</head>
<body>
    <style>
        body{
            background-color: #0B0F1C;
            border: 0;
            margin: 0;
            padding: 0;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        /*grid de navegação */
       
        .container-grid{/*container pai*/
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 30% 100px 400px;
            row-gap: 20px;
            column-gap: 20px;
        }
        nav{/*barra de navegação vertical */
            width: 280px;
            border-right: 1px solid rgb(63, 65, 63);
            box-shadow: 10px 0px 20px rgba(255, 255, 255, 0.105);
            grid-row-start: 1;
            grid-row-end: 5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
                
        }
        i{
            font-size: 20px;
            color: white;
            margin-left: 10px;
        }

        .container-grid >  div{ /* coteudo */
            border: 1px solid red;
            position: relative;
            display: flex;
            right: 280px;
            grid-column-start: 2;
            grid-column-end: 4;
                
        }

        /* dentro da nav */

        .nav-bar ul{
            list-style: none;
            padding: 20px;
            margin-right: 1px;
        }

        .nav-bar ul li{
            width: 280px;
            padding: 20px;
           
        }

        .nav-bar ul li:hover{
            cursor: pointer;
            background-color: #4b4942;
            border: 1px solid #868682;
        }

        .nav-bar ul li a{
            text-decoration: none;
            color: white;
            margin-left: 30px;
        }


    </style>

<section class="container-grid">

    <nav class="nav-bar"><!-- nav-bar -->
        <img src="mental-health.png" width="50" alt="">
        <ul>
            <li onclick="Home()"><i class="bi bi-plus-lg"></i><a href="#">Novo</a></li>
            <li onclick="pagina2()"><i class="bi bi-clock-fill"></i><a href="#">Fila</a></li>
            <li><i class="bi bi-person-vcard"></i><a href="#">Atendimentos</a></li>
            <li><i class="bi bi-x-octagon"></i><a href="#">Cancelados</a></li>
            <li><i class="bi bi-wallet2"></i><a href="#">Caixa</a></li>
            <li><i class="bi bi-gear-fill"></i><a href="#">Configurações</a></li>
            <li><i class="bi bi-box-arrow-right"></i><a href="#">Fechar</a></li>
        </ul>

    </nav><!-- nav-bar-->

    <div class="cont"> <!-- cont -->

    </div><!-- cont -->

    <div class="cont2"><!-- cont2 -->

    </div><!-- cont2 -->

</section>
    
</body>
<script>

function pagina2(){
    addEventListener('click',function(){
      window.location.href = "pagina2.html";
    })
}

    addEventListener('click',function(){
      window.location.href = "navlateralGrid.html";
    })
}

</script>
</html>
