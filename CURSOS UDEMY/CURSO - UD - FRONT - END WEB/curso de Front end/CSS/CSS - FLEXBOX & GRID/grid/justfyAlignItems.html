<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID</title>

    <style>
        body{
            font-size: 3rem; /*almenta o tamnho da fonte  */

            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;/*espaçamento interno do container e externo na div*/
        }


        .grid{/* a classe pai */
         
           border: 1px solid red;
            row-gap: 20px;
            column-gap: 20px;
            display: grid;
            grid-template-columns: repeat(3,1fr);/*pesquisar depois sobre isso */
            grid-template-rows: repeat(4,100px);
            justify-items: stretch;/*ele controla o item dentro do grid*/
            
         
    

        }

        .grid > div{ /*pegando a classe pai e chamando a filhos divs dentro da classe  */

            border: 5px solid red;



        }

        /* */
    </style>
</head>
<body>

    <div class="grid"><!-- container grid -->
        <div class="item1">1</div>
        <div class="item1">2</div>
        <div class="item1">3</div>
        <div class="item1">4</div>
        <div class="item1">5</div>
        <div class="item1">6</div>
        <div class="item1">7</div>
        <div class="item1">8</div>
        <div class="item1">9</div>
        <div class="item1">10</div>
        <div class="item1">11</div>
        <div class="item1">12</div>

    </div><!-- container grid -->

    <!--  -->
    
</body>
</html>
