<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
    <style>
        header,article, aside , time , section ,  main , nav footer{
            border: 1px solid red;
        }


    </style>
</head>
<body>

    <!-- onde as tags estao localizzadas é onde elas serao usadas em projetos reais -->

    <header><!-- tag de inicio de site inde vai ficar a navegação e a logo do site -->
        Logo
         <nav> Home / Produtos / Loja </nav>  
    </header>

    <main><!-- tag de meio de pagina onde vai ficar o conteudo dela -->
        Conteudo Principais



         <article><!-- serve para ser colocado para que que voce possa colocar noticia, ele é uma parte do seu conteudo  -->
           noticia resumo de noticia
           <section>desenvolvimento mobile</section><!-- parte seção de algum elemento -->
         </article>


          <aside>
            complementar ao conteudo principal , navegação lateral do site
    </aside>

    </main>

    <footer><!-- Tag de final da tag que ira ficar o final dela o rodapé -->
        Todos os direitos reservados
    </footer>
    
</body>
</html>
