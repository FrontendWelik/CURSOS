    <!-- 
    Sobre posição de elementos, ao usar posicionamento relativo, fixo ou absoluto,

    sera utilizado a propriedade Z-index
    quanto maior o numero , mais o elemento se 
    sobrepoem aos outros(Aparecendo a frente)
    tem que ser nos dois elementos que forem aplicado o z-index
     -->
<!-- 
    <div class="caixa1"> caixa 1 </div>
    <div class="caixa2"> caixa 2 </div>
    <div class="caixa3"> caixa 3 </div>
-->
