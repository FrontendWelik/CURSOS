<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Barra de navegação piquena com separação de elementos </title>
</head>
<body>
    <style>
        
        .Pai{
            border: 1px solid red;
            width: 500px;
            margin: 10px auto;
            padding: 20px 20px;
        }
        a{
            text-decoration: none;
            margin: 0 10px;
            color: black;
            width: 50px;
            background-color: antiquewhite;
            text-align: center;
        
        }

        a:hover{
            background-color: black;
            color: white;
           
        }
        .direita{
            float: right;
            left: 10px;

        }
        h1{
            text-align: center;
        }

    </style>

    <div class="Pai">
        <div>
            <a href="#">Logo</a>
        <a href="#" class="direita">Home</a>
        <a href="#" class="direita">Sobre</a>
        <a href="#" class="direita">Contato</a>
        <a href="#" class="direita">Mais</a>

        </div>
    </div>
    <h1> Barra de navegação Com os elementos separados</h1>
    
</body>
</html>
