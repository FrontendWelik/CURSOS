<!-- Se um elemento de nivel bloco estuver dentro de outro elemento de nivel bloco, essa caixa
 é conhecida como elemento container ou Pai
 
 é normal agrupar vrios elementos , dentro de um elemento div esse elemento que contem esses 
 elementos é cahamdo de pai 

 fluxo normal : cada elemento de nivel de bloco aparece em uma nova linha , faxendo com que 
 cada item apareça um abaixo do outro , mesmo que voce defina e tenha espaço para ficar um ao 
 lado do outro , eles nao ficaram , pois esse é o comportamento padrão(ao menos que voce defina que 
 seja feito diferente) elelemntos flutuantes - posicionamento sao diferentes 

 elemento flutuante (float:right) - faz o elmento flutuar , permite remover esse elemento do fluxo normal
 e posiciopna-lo mais a direita ou á esuqerda de uma caixa container  

 muitos leyouts posicionam caixas lado a lado epara poder atingir esse objetivo , utilize elementos flutuantes

 flexbox e grid (sao mais modernos hoje) - normalmente utiliza-se o grid  para criar a estrutura do nosso site , e o flexbox para organizar 
 o conteudo e criar componentes
