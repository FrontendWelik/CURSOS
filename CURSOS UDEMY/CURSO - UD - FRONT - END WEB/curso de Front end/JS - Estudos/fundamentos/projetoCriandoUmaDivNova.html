<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>criando uma div nova</title>
</head>
<body>
    <style>
        .pai{
            border: 1px solid red;
            width: 800px;
            margin: 10px auto;
            padding: 20px;
        }

        .filho form{
            border: 1px solid blue;
            width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            margin-top: 10px;
        }

        input{
            margin-top: 8px;
            padding: 10px;
            border: 1px solid rgba(128, 128, 128, 0.562);
            border-radius: 8px;
        }

        button{
            width: 200px;
            margin-top: 20px;
            padding: 7px 50px;
        }

        #card{
            display: none;
            border: 1px solid green;
            width: 600px;
            padding: 20px;
            margin-top: 10px;
        }

        #card div{
            border: 1px solid grey;
            padding: 10px;
            margin-top: 8px;
        }

    </style>

    <div class="pai">
        <div class="filho">
            <form>
                <label for=""> nome </label>
                <input type="text" placeholder="Coloque seu nome" id="nome">

                <label for=""> contato </label>
                <input type="text" placeholder="Coloque seu contato" id="contato">

                <label for=""> email </label>
                <input type="text" placeholder="Coloque seu email" id="email">

                <button onclick="criarCard()">criar</button>
            </form>

            <div id="card">
                <div>nome</div>
                <div>contato</div>
                <div>email</div>
            </div>

        </div>

    </div>


<script>

   // 1. Função para carregar os dados do "banco" assim que a página abrir
window.onload = function() {
    renderizarCards();
};

function criarCard() {
    event.preventDefault();

    // Pegar valores dos inputs
    let nome = document.getElementById("nome").value;
    let contato = document.getElementById("contato").value;
    let email = document.getElementById("email").value;

    if(nome === "") return alert("Preencha o nome!");

    // 2. Criar o objeto que representa o novo registro
    const novoUsuario = {
        nome: nome,
        contato: contato,
        email: email
    };

    // 3. Buscar a lista que já existe no LocalStorage ou criar uma vazia
    let listaUsuarios = JSON.parse(localStorage.getItem("meuBanco")) || [];

    // 4. Adicionar o novo usuário na lista
    listaUsuarios.push(novoUsuario);

    // 5. Salvar a lista atualizada de volta no LocalStorage
    localStorage.setItem("meuBanco", JSON.stringify(listaUsuarios));

    // Limpar campos e atualizar a tela
    document.querySelector("form").reset();
    renderizarCards();
}

function renderizarCards() {
    const containerPai = document.querySelector(".filho");
    
    // Limpar os cards antigos antes de desenhar os novos (para não duplicar)
    // Mantemos apenas o formulário original
    const formulario = containerPai.querySelector("form");
    containerPai.innerHTML = "";
    containerPai.appendChild(formulario);

    // 6. Ler os dados do "banco"
    let listaUsuarios = JSON.parse(localStorage.getItem("meuBanco")) || [];

    // 7. Criar visualmente cada card que está no banco
    listaUsuarios.forEach((usuario, index) => {
        const novoCard = document.createElement("div");
        novoCard.id = "card";
        novoCard.style.display = "block";
        novoCard.innerHTML = `
            <div><strong>Nome:</strong> ${usuario.nome}</div>
            <div><strong>Contato:</strong> ${usuario.contato}</div>
            <div><strong>Email:</strong> ${usuario.email}</div>
            <button onclick="deletarCard(${index})" style="width: 100px; background: #ff4d4d; color: white; border: none; margin-top: 10px; cursor: pointer;">Excluir</button>
        `;
        containerPai.appendChild(novoCard);
    });
}

// Função extra: para deletar um item do banco
function deletarCard(index) {
    let listaUsuarios = JSON.parse(localStorage.getItem("meuBanco")) || [];
    listaUsuarios.splice(index, 1); // Remove o item da lista
    localStorage.setItem("meuBanco", JSON.stringify(listaUsuarios)); // Salva a nova lista
    renderizarCards(); // Atualiza a tela
}

</script>
    
</body>
</html>
