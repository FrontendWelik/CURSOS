<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script><!-- so utilizar o tailwind como qualuqer outra coisa-->
    <title>Document</title>
</head>
<body>

    <h1 class="text-5xl font-bold text-rose-600">Este é meu estilo tailwind css</h1>
    <!-- text = pega o texto ,-5xl almenta o tamanho do texto 
     font-bolt = é o tipo da fonte do texto
     text-rose = ele pega o texto e define a cor do texto
     -600 = qunato maior o numero mais escuro ele fica -->

     <div class="bg-slate-900 w-96 h-64 mx-4 my-4"><!-- 
        bg = background , cor de fundo
        w = width 
        h = heigth
        my = em cima e embaixo os numeros sao os valores que depois sao mostrados como px de cada valor
        mx = margin esquerda e direita 
        mb = margin bottun em baixo 
        ml = margin left
        mt = margin top 
        p = pedding-->

        <h2 class="text-white p-30">aprendendo o css </h2>
     </div>

     <div class="bg-[#bdc750] w-full h-20">
        <!-- bg-[cor] = para escolher o tipo de cor  -->
      <div class="w-20 h-20  shadow-md shadow-emerald-300 mb-4 hover:shadow-black"></div><!--shadow-cor-300 - shadow-md sombra menor -->
      <div class="w-20 h-20  shadow-lg shadow-cyan-200 mb-4 hover:shadow-black hover:w-24"></div><!--shadow-cor-300 -  shadow-lg sombra um pouco maior  -->
      <div class="w-20 h-20  shadow-xl shadow-fuchsia-950 mb-4 hover:shadow-black"></div><!--shadow-cor-300 -  shadow-xl sombra maior -->
      <div class="w-20 h-20  shadow-2xl shadow-slate-900 mb-4 hover:shadow-black"></div><!--shadow-cor-300 - shadow-2xl sombra bem amior -->
     </div>

     <!-- extender para criar cores  -->
      
        
    
    
   
<!--  -->
</body>
</html>
