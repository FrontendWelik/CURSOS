   <div class="w-96 h-96 border-4 flex justify-around items-center"><!-- 
    classe pai onde o flex deve ser colocado para mudar os elementos dentro dele 
    flex = display-flex
    flex-col = coluna um abaixo do outro
    justify = oque vai mudar os itens de lugar dentro da classe pai
    mexer nas colulas items =  item-center = vao ao centro
    -->

    <div class="w-20 h-20 bg-red-500">1</div>
    <div class="w-20 h-20 bg-green-500">2</div>
    <div class="w-20 h-20 bg-blue-500">3</div>

   </div>

    -->

    <div class="w-20 h-20 bg-green-500 flex-1">2</div>

   </div>
