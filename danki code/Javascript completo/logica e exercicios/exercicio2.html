<html>
<body>
    <script>
        /* calculo de idade  */

        var anoNascimento = prompt('por favor informe a ano do seu nascimento');
        
        

        while(anoNascimento >= 2025){
            alert("por favor informar seu nascimento corretamente.");
            anoNascimento = prompt("por favor inform o ano do seu nascimento");
        }

        var anoAtual = prompt(' ano  atual ');
        var idadeFinal = anoAtual - anoNascimento;

        alert('a idade é '+idadeFinal);




    </script>
</body>
