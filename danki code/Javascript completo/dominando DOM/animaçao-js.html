<html>
<body>
    <style>
        .box{
            width:300px;
            height: 300px;
            background-color: aqua;
            margin-left: 0;
        }

        .animEsquerta{
            transition: 1s;
            margin-left: 120px;
            margin-top: 100px;
            background-color: black;
        }


    </style>

    <div class="box"></div>

    <script> 
    var box = document.querySelectorAll('.box')[0];
    /*
    setTimeout(()=>{
        box.classList.add('animEsquerta');
    },1000);
    */

    box.addEventListener('click',()=>{
        box.classList.add('animEsquerta');
    })

    </script>
</body>
</html>
